name: exoplayer_jni
description: >
  Flutter FFI plugin providing full ExoPlayer (Media3) access from Dart via JNIgen.
  Generates type-safe Dart bindings for androidx.media3 classes using package:jnigen.
version: 0.1.0
homepage: https://github.com/your-org/exoplayer_jni

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  jni: ^1.0.0
  jni_flutter: ^1.0.1
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  jnigen: ^0.16.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
        package: com.example.exoplayer_jni
        pluginClass: ExoplayerJniPlugin
